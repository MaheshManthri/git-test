<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Business Analytics & Decision Support System</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="logo">
            Business Analytics & Decision Support System
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="main">

        <!-- CALCULATOR BOX -->
        <div class="calculator-box">

            <h2>Hypothesis Test Calculator</h2>

            <!-- 1️⃣ Test Type -->
            <div class="row">
                <label>Choose Test Type</label>
                <select id="testType" onchange="updateInputs()">
                    <option value="">Select</option>
                    <option value="one">One Sample t-Test</option>
                    <option value="two">Two Sample t-Test</option>
                    <option value="paired">Paired t-Test</option>
                </select>
            </div>

            <!-- 2️⃣ Hypothesis Inputs -->
            <div class="row">
                <label>Hypothesized Mean (μ₀)</label>
                <input type="number" id="mu0" placeholder="e.g. 500">

                <label>α</label>
                <select id="alpha">
                    <option value="0.01">0.01</option>
                    <option value="0.05" selected>0.05</option>
                    <option value="0.10">0.10</option>
                </select>

                <label>Alternative</label>
                <select id="alternative">
                    <option value="Two-tailed">Two-tailed</option>
                    <option value="Right-tailed">Right-tailed</option>
                    <option value="Left-tailed">Left-tailed</option>
                </select>
            </div>

            <hr>

            <!-- 3️⃣ Data Input -->
            <h3>Enter Sample Data</h3>

            <div id="dataSection">
                <!-- Default One-Sample Input -->
                <table>
                    <tr>
                        <th>Sample Values</th>
                    </tr>
                    <tr>
                        <td><input type="number" class="sample-input"></td>
                    </tr>
                    <tr>
                        <td><input type="number" class="sample-input"></td>
                    </tr>
                </table>

                <button type="button" onclick="addRow()">Add Row</button>
            </div>

            <hr>

            <!-- 4️⃣ Business Context -->
            <div class="row">
                <label>Business Decision Context</label>
            </div>
            <textarea id="businessContext" placeholder="e.g. Test whether new pricing increases sales"></textarea>

            <br><br>

            <!-- 5️⃣ Run Button -->
            <button onclick="runHypothesisTest()">Run Hypothesis Test</button>

            <hr>

            <!-- 6️⃣ Output -->
            <div id="output" class="output-box"></div>

        </div>
        <!-- END CALCULATOR -->

    </div>

    <!-- JavaScript -->
    <script src="hyp_javascript.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Business Analytics & Decision Support System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">Business Analytics & Decision Support System</div>
</header>

<div class="main">
<div class="calculator-box">

<h2>Hypothesis Test Calculator</h2>

<!-- Hypotheses -->
<div class="row">
    <label>Hypothesized Mean (μ₀)</label>
    <input type="number" id="mu0">

    <label>Alternative Mean (μ)</label>
    <input type="number" id="mu1">
</div>

<div class="row">
    <label>Significance Level (α)</label>
    <select id="alpha">
        <option value="0.01">0.01</option>
        <option value="0.05" selected>0.05</option>
        <option value="0.10">0.10</option>
    </select>

    <label>Decimal Places</label>
    <select id="decimals">
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
    </select>
</div>

<hr>

<!-- Sample Info -->
<div class="row">
    <label>Sample Mean (x̄)</label>
    <input type="number" id="xbar">

    <label>Sample Size (n)</label>
    <input type="number" id="n">
</div>

<hr>

<!-- Std Deviation -->
<div class="row">
    <label>Do you know the population standard deviation?</label>
    <select id="stdKnown" onchange="toggleStd()">
        <option value="">Select</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
    </select>
</div>

<div class="row" id="sigmaRow" style="display:none;">
    <label>Population Std Deviation (σ)</label>
    <input type="number" id="sigma">
</div>

<div class="row" id="sRow" style="display:none;">
    <label>Sample Std Deviation (s)</label>
    <input type="number" id="s">
</div>

<br>

<button onclick="runTest()">Run Hypothesis Test</button>

<hr>

<div id="output" class="output-box"></div>

</div>
</div>

<script src="hyp_javascript.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Demand Estimation – Decision Assistant</title>

<!-- CSS -->
<link rel="stylesheet" href="DEstyle.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<h2>📊 Demand Estimation – Decision Assistant</h2>

<div class="info">
<b>Demand Estimation</b> estimates how quantity demanded responds to price.

<br><br>
<b>Demand Function:</b><br>
Q = a + bP
</div>

<h3>Input Data (Price – Quantity)</h3>

<table id="inputTable">
<thead>
<tr>
<th>Obs</th>
<th>Price (P)</th>
<th>Quantity (Q)</th>
</tr>
</thead>
<tbody>
<tr>
<td>1</td>
<td><input type="number" class="price"></td>
<td><input type="number" class="qty"></td>
</tr>
</tbody>
</table>

<button class="btn-add" onclick="addRow()">➕ Add Observation</button>
<button class="btn-calc" onclick="calculate()">📈 Estimate Demand</button>

<h3>Calculation Table</h3>
<table id="calcTable">
<thead>
<tr>
<th>P</th>
<th>Q</th>
<th>P²</th>
<th>PQ</th>
</tr>
</thead>
<tbody></tbody>
<tfoot>
<tr>
<th>ΣP</th>
<th>ΣQ</th>
<th>ΣP²</th>
<th>ΣPQ</th>
</tr>
</tfoot>
</table>

<canvas id="demandChart" height="300"></canvas>

<div class="result" id="result"></div>

</div>

<!-- JS -->
<script src="DEscript.js"></script>
</body>
</html>
